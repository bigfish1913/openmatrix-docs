version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: openmatrix-nginx
    ports:
      - "8080:80"
    volumes:
      # WSL 路径映射 - 根据实际位置调整
      - ../website:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
