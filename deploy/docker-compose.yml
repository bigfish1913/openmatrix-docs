version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: openmatrix-nginx
    ports:
      - "8080:80"
    volumes:
      - ../website:/usr/share/nginx/html/website:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    networks:
      - openmatrix-network

networks:
  openmatrix-network:
    driver: bridge
